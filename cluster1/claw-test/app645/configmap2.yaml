apiVersion: v1
kind: ConfigMap
metadata:
  name: perf-test8-app645-runtime-config
  namespace: clawtest
  labels:
    app: perf-test8-app645
    app.kubernetes.io/name: perf-test8-app645
    app.kubernetes.io/component: runtime-config
    app.kubernetes.io/part-of: argocd-perf-test
data:
  JVM_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
  JVM_GC_LOG: "/var/log/perf-test8-app645/gc.log"
  JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai"
  PROFILING_ENABLED: "false"
  PROFILING_AGENT: "pyroscope"
  PROFILING_SERVER: "http://pyroscope.monitoring.svc.cluster.local:4040"
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "5"
  HEALTH_CHECK_RETRIES: "3"
  SHUTDOWN_GRACE_PERIOD: "30"
  MAX_THREADS: "200"
  MIN_THREADS: "10"
  THREAD_QUEUE_CAPACITY: "500"
  HTTP_CLIENT_CONNECT_TIMEOUT: "5000"
  HTTP_CLIENT_READ_TIMEOUT: "30000"
  HTTP_CLIENT_MAX_CONNECTIONS: "100"
  HTTP_CLIENT_MAX_IDLE: "20"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  METRICS_PATH: "/actuator/prometheus"
  LOG_ASYNC: "true"
  LOG_QUEUE_SIZE: "1024"
  LOG_DISCARD_THRESHOLD: "80"
