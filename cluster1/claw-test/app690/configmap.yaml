apiVersion: v1
kind: ConfigMap
metadata:
  name: perf-test8-app690-config
  namespace: clawtest
  labels:
    app: perf-test8-app690
    app.kubernetes.io/name: perf-test8-app690
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: argocd-perf-test
data:
  APP_NAME: "perf-test8-app690"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "performance-test"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  MAX_CONNECTIONS: "1024"
  WORKER_PROCESSES: "auto"
  KEEPALIVE_TIMEOUT: "65"
  CLIENT_MAX_BODY_SIZE: "10m"
  UPSTREAM_TIMEOUT: "60"
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
        location /healthz {
            access_log off;
            return 200 'ok';
        }
        location /ready {
            access_log off;
            return 200 'ready';
        }
    }
  settings.json: |
    {
      "app": "perf-test8-app690",
      "version": "1.0.0",
      "features": {
        "metrics": true,
        "tracing": false
      }
    }
