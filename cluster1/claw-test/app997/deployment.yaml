apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-test8-app997
  namespace: clawtest
  labels:
    app: perf-test8-app997
spec:
  replicas: 1
  selector:
    matchLabels:
      app: perf-test8-app997
  template:
    metadata:
      labels:
        app: perf-test8-app997
    spec:
      containers:
      - name: perf-test8-app997
        image: anolis-registry.cn-zhangjiakou.cr.aliyuncs.com/openanolis/nginx:1.14.1-8.6
        ports:
        - containerPort: 80
        volumeMounts:
        - name: data-vol
          mountPath: /data
      volumes:
      - name: data-vol
        persistentVolumeClaim:
          claimName: perf-test8-app997-pvc
